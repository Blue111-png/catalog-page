version: '3.9'

services:
  db:
    image: postgres:15
    container_name: catalog-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: catalogdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: catalog-backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: catalogdb
      CLOUDINARY_URL: https://cloudinary.com
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
    command: npm start

volumes:
  db_data:
